<div class="flex h-screen bg-slate-950 overflow-hidden">

  <!-- ══════════════════════════════════════════════════
       SIDEBAR ADMIN (dark/violet)
  ══════════════════════════════════════════════════ -->
  <aside class="fixed inset-y-0 left-0 z-30 flex flex-col w-64 bg-slate-900 border-r border-slate-800 transition-transform duration-300 ease-in-out"
         [class.-translate-x-full]="!sidebarOpen()"
         [class.translate-x-0]="sidebarOpen()"
         [class.lg:translate-x-0]="true">

    <!-- Logo admin -->
    <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-800">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-600 to-purple-700 flex items-center justify-center shrink-0 shadow shadow-violet-900">
        <lucide-icon [img]="icons.ShieldCheck" class="text-white w-5 h-5" [size]="18" />
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-xs font-bold text-white tracking-wider uppercase leading-none">YAAHW</p>
        <p class="text-xs text-violet-400 mt-0.5 font-medium">Super Admin</p>
      </div>
      <button class="lg:hidden p-1.5 rounded-lg hover:bg-slate-800 text-slate-400"
              (click)="closeSidebar()">
        <lucide-icon [img]="icons.X" class="w-4 h-4" [size]="16" />
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-0.5">
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path"
           routerLinkActive="admin-nav-active"
           [routerLinkActiveOptions]="{ exact: item.exact }"
           (click)="closeSidebar()"
           class="admin-nav-item">
          <lucide-icon [img]="item.icon" class="w-5 h-5 shrink-0" [size]="20" />
          <span class="text-sm font-medium">{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Footer -->
    <div class="p-4 border-t border-slate-800">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-9 h-9 rounded-full bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center shrink-0">
          <span class="text-white text-xs font-bold">
            {{ (user()?.prenom?.[0] ?? '') + (user()?.nom?.[0] ?? '') | uppercase }}
          </span>
        </div>
        <div class="min-w-0 flex-1">
          <p class="text-sm font-semibold text-white truncate">{{ user()?.prenom }} {{ user()?.nom }}</p>
          <p class="text-xs text-violet-400 font-medium">Administrateur</p>
        </div>
      </div>
      <button (click)="logout()"
              class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-slate-400 hover:bg-red-950/40 hover:text-red-400 transition-colors">
        <lucide-icon [img]="icons.LogOut" class="w-4 h-4 shrink-0" [size]="16" />
        Se déconnecter
      </button>
    </div>
  </aside>

  <!-- Overlay mobile -->
  @if (sidebarOpen()) {
    <div class="fixed inset-0 z-20 bg-black/60 backdrop-blur-sm lg:hidden"
         (click)="closeSidebar()"></div>
  }

  <!-- ══════════════════════════════════════════════════
       CONTENU PRINCIPAL
  ══════════════════════════════════════════════════ -->
  <div class="flex flex-col flex-1 min-w-0 lg:ml-64 bg-slate-950">

    <!-- Topbar mobile -->
    <header class="lg:hidden flex items-center gap-4 px-4 py-3 bg-slate-900 border-b border-slate-800 shrink-0">
      <button (click)="toggleSidebar()"
              class="p-2 rounded-lg hover:bg-slate-800 text-slate-400 transition-colors">
        <lucide-icon [img]="icons.Menu" class="w-5 h-5" [size]="20" />
      </button>
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-violet-600 to-purple-700 flex items-center justify-center">
          <lucide-icon [img]="icons.ShieldCheck" class="text-white w-4 h-4" [size]="14" />
        </div>
        <span class="font-bold text-white text-sm">Admin</span>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>
  </div>

</div>
